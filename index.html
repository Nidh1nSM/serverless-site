<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Serverless Site</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Orbitron', sans-serif;
    }
    body {
    height: 100vh;
    background: linear-gradient(135deg, #0a0f2c, #1a1f4d, #3a0ca3);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

    /* Animated Background Glow */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(0,255,255,0.2), transparent 70%);
        animation: rotate 10s linear infinite;
        z-index: 0;
    }

    @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .container {
        text-align: center;
        z-index: 1;
    }

    h1 {
        font-size: 3rem;
        color: #0ff;
        text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #0ff; }
        to { text-shadow: 0 0 25px #0ff, 0 0 40px #0ff; }
    }

    p {
        margin: 20px 0;
        font-size: 1.2rem;
        color: #ccc;
    }

    .btn {
        padding: 12px 25px;
        border: 2px solid #0ff;
        background: transparent;
        color: #0ff;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 30px;
        transition: 0.3s;
        box-shadow: 0 0 10px #0ff;
    }

    .btn:hover {
        background: #0ff;
        color: black;
        box-shadow: 0 0 25px #0ff, 0 0 50px #0ff;
        transform: scale(1.1);
    }

    /* Floating animation */
    .card {
        margin-top: 30px;
        padding: 20px;
        border: 1px solid rgba(0,255,255,0.3);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        animation: float 3s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(0,255,255,0.2);
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

</style>
</head>

<body>

<div class="container">
    <h1>⚡ Neon Serverless Site</h1>
    <p>Deployed using modern serverless technology</p>

    <button class="btn" onclick="showMessage()">Launch Interaction</button>

    <div class="card">
        <p>✨ No Backend Required</p>
        <p>🚀 Fully Animated UI</p>
        <p>🌐 Cloud Ready Deployment</p>
    </div>
</div>

<script>
function showMessage() {
    alert("⚡ Welcome! This is a serverless interactive UI.");
}
</script>

</body>
</html>
